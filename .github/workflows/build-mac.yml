name: Build Mac

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore source package
        run: |
          if ls VRMOTION-VRPLAYER-LITE-MAC-SOURCE.zip.* 1>/dev/null 2>&1; then
            cat VRMOTION-VRPLAYER-LITE-MAC-SOURCE.zip.* > source.zip
            rm -rf source
            mkdir source
            unzip -q source.zip -d source
            echo "APP_DIR=source" >> "$GITHUB_ENV"
          else
            echo "APP_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      - name: Build macOS ${{ matrix.arch }}
        working-directory: ${{ env.APP_DIR }}
        run: npm run build:mac:${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VRMOTION-VRPLAYER-LITE-1.05-mac-${{ matrix.arch }}
          path: |
            ${{ env.APP_DIR }}/dist-mac/*.dmg
            ${{ env.APP_DIR }}/dist-mac/*.zip
            ${{ env.APP_DIR }}/dist-mac/latest-mac.yml
          if-no-files-found: error
